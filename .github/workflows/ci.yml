name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  TZ: UTC
  LANG: C.UTF-8
  LC_ALL: C.UTF-8
  PREMATH_REPOSITORY: ${{ format('{0}/premath', github.repository_owner) }}
  PREMATH_REF: main

jobs:
  premath-workspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Run Premath standalone entrypoint
        run: ./scripts/premath_workspace_ci.sh

  conformance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Run conformance fixtures
        run: cargo test --test conformance

  witness-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Validate per-pack witness schema
        run: cargo test --test witness_schema

      - name: Validate per-pack provenance completeness
        run: cargo test --test provenance_witnesses

      - name: Validate defining-leaf pointer precision
        run: cargo test --test provenance_defining_leaf

  compose-witness-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Validate compose witness schema
        run: cargo test --test compose_witness_schema

      - name: Validate compose provenance completeness
        run: cargo test --test compose_provenance

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Validate path-safety fixtures
        run: cargo test --test path_safety

      - name: Validate pack identity pinning
        run: cargo test --test pack_identity_pinning

      - name: Validate signing trust flow
        run: cargo test --test signing

  context-scaling-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Capture context-scaling metrics
        run: python3 scripts/context_metrics.py

      - name: Upload context metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: context-scaling-metrics
          path: perf-metrics/

  build-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Build example pack
        run: |
          cargo run -- build \
            examples/charter-steel/charter-steel.resolver.json \
            --contracts examples/charter-steel/component-contracts.json \
            --out dist-ci \
            --target css \
            --policy examples/charter-steel/policy.json \
            --format json

      - name: Emit GitHub annotations (pack report)
        if: always()
        run: |
          cargo run -- annotate-report dist-ci/validation.json \
            --file-root examples/charter-steel \
            --max 200

      - name: Build example compose report
        run: |
          cargo run -- compose \
            dist-ci \
            dist-ci \
            --out dist-compose-ci \
            --target css \
            --contracts examples/charter-steel/component-contracts.json \
            --policy examples/charter-steel/policy.json \
            --format json

      - name: Emit GitHub annotations (compose report)
        if: always()
        run: |
          cargo run -- annotate-report dist-compose-ci/compose.report.json \
            --max 200

      - name: Verify certificate
        run: |
          cargo run -- verify dist-ci/ctc.manifest.json

  native-swift-integration:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Build native Swift artifacts
        run: |
          cargo run -- build \
            examples/charter-steel/charter-steel.resolver.json \
            --out dist-native-swift \
            --target swift-tokens

      - name: Run generated Swift package tests (pack)
        run: |
          cd dist-native-swift/swift
          swift test

      - name: Build alpha-color Swift artifacts
        run: |
          cargo run -- build \
            examples/native-color-edge/native-color-edge.resolver.json \
            --out dist-native-swift-alpha \
            --target swift-tokens

      - name: Run generated Swift package tests (alpha fixture)
        run: |
          cd dist-native-swift-alpha/swift
          swift test

      - name: Build native Swift compose artifacts
        run: |
          cargo run -- compose \
            dist-native-swift \
            dist-native-swift \
            --out dist-native-compose-swift \
            --target swift-tokens \
            --format text

      - name: Run generated Swift package tests (compose)
        run: |
          cd dist-native-compose-swift/swift
          swift test

  native-android-integration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native Android artifacts
        run: |
          cargo run -- build \
            examples/charter-steel/charter-steel.resolver.json \
            --out dist-native-android \
            --target android-compose-tokens

      - name: Run generated Android module tests (pack)
        run: |
          cd dist-native-android/android
          gradle --no-daemon test

      - name: Build alpha-color Android artifacts
        run: |
          cargo run -- build \
            examples/native-color-edge/native-color-edge.resolver.json \
            --out dist-native-android-alpha \
            --target android-compose-tokens

      - name: Run generated Android module tests (alpha fixture)
        run: |
          cd dist-native-android-alpha/android
          gradle --no-daemon test

      - name: Build native Android compose artifacts
        run: |
          cargo run -- compose \
            dist-native-android \
            dist-native-android \
            --out dist-native-compose-android \
            --target android-compose-tokens \
            --format text

      - name: Run generated Android module tests (compose)
        run: |
          cd dist-native-compose-android/android
          gradle --no-daemon test

  all-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust + Premath
        uses: ./.github/actions/setup-paint-rust
        with:
          premath-repository: ${{ env.PREMATH_REPOSITORY }}
          premath-ref: ${{ env.PREMATH_REF }}

      - name: Run full test suite
        run: cargo test --all
