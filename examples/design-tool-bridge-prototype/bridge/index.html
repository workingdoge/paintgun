<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paint Design-Tool Bridge Prototype</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <style>
      :root {
        --paper: #f6f1e8;
        --paper-2: #ece2d2;
        --ink: #142031;
        --ink-soft: #4b5a6d;
        --panel: rgba(255, 252, 247, 0.82);
        --panel-strong: rgba(255, 250, 242, 0.95);
        --line: rgba(20, 32, 49, 0.12);
        --accent: #2566d8;
        --accent-soft: rgba(37, 102, 216, 0.12);
        --success: #11643d;
        --success-soft: rgba(17, 100, 61, 0.14);
        --shadow: 0 28px 90px rgba(20, 32, 49, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(37, 102, 216, 0.16), transparent 34%),
          radial-gradient(circle at bottom right, rgba(215, 119, 54, 0.12), transparent 32%),
          linear-gradient(180deg, #f7f4ee 0%, #efe6d9 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(20, 32, 49, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(20, 32, 49, 0.03) 1px, transparent 1px);
        background-size: 28px 28px;
        pointer-events: none;
        opacity: 0.45;
      }

      #app {
        position: relative;
        min-height: 100vh;
      }

      .shell {
        width: min(1220px, calc(100vw - 40px));
        margin: 24px auto;
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 28px;
        background: rgba(255, 248, 240, 0.68);
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        margin: 0 0 10px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(260px, 0.8fr);
        gap: 18px;
        margin-bottom: 18px;
      }

      .hero-card,
      .panel {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        padding: 20px;
      }

      .hero-card strong,
      .panel strong {
        color: var(--ink);
      }

      .title {
        margin: 0;
        font-size: clamp(34px, 5vw, 54px);
        line-height: 0.95;
      }

      .lede {
        margin: 14px 0 0;
        max-width: 52ch;
        color: var(--ink-soft);
        font-size: 15px;
        line-height: 1.5;
      }

      .badge-row,
      .metric-row,
      .source-list,
      .artifact-grid,
      .example-grid,
      .token-grid,
      .fact-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .badge-row {
        margin-top: 16px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--ink);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.03em;
      }

      .badge.success {
        background: var(--success-soft);
        color: var(--success);
      }

      .metric {
        min-width: 110px;
        padding: 12px 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.48);
        border: 1px solid rgba(20, 32, 49, 0.08);
      }

      .metric-label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--ink-soft);
      }

      .metric-value {
        display: block;
        margin-top: 6px;
        font-size: 24px;
        font-weight: 700;
      }

      .workspace {
        display: grid;
        grid-template-columns: 270px minmax(0, 1fr);
        gap: 18px;
      }

      .nav {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .nav button {
        all: unset;
        cursor: pointer;
        display: block;
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.46);
        transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      .nav button:hover,
      .nav button[aria-current="true"] {
        transform: translateY(-1px);
        border-color: rgba(37, 102, 216, 0.28);
        background: var(--panel-strong);
      }

      .nav button[aria-current="true"] {
        box-shadow: inset 0 0 0 1px rgba(37, 102, 216, 0.18);
      }

      .nav-title {
        display: block;
        font-size: 16px;
        font-weight: 700;
      }

      .nav-meta {
        display: block;
        margin-top: 6px;
        color: var(--ink-soft);
        font-size: 13px;
        line-height: 1.45;
      }

      .content {
        display: grid;
        gap: 18px;
      }

      .section-title {
        margin: 0 0 4px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .section-heading {
        margin: 0;
        font-size: 32px;
        line-height: 1;
      }

      .section-copy {
        margin: 12px 0 0;
        color: var(--ink-soft);
        line-height: 1.6;
        max-width: 62ch;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .fact-grid {
        margin-top: 16px;
      }

      .fact {
        min-width: 200px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.56);
      }

      .fact-label {
        display: block;
        font-size: 12px;
        color: var(--ink-soft);
      }

      .fact-value {
        display: block;
        margin-top: 6px;
        font-size: 15px;
        font-weight: 700;
      }

      .artifact-grid,
      .source-list,
      .example-grid {
        margin-top: 14px;
      }

      .artifact-card,
      .source-card,
      .example-card {
        min-width: 0;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.55);
      }

      .artifact-card,
      .source-card {
        flex: 1 1 260px;
      }

      .example-card {
        flex: 1 1 260px;
      }

      .card-kicker {
        margin: 0 0 6px;
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .card-title {
        margin: 0;
        font-size: 20px;
      }

      .card-copy {
        margin: 10px 0 0;
        color: var(--ink-soft);
        line-height: 1.5;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .pill {
        padding: 7px 10px;
        border-radius: 999px;
        background: rgba(20, 32, 49, 0.06);
        font-size: 12px;
        font-weight: 600;
      }

      .token-grid {
        margin-top: 14px;
      }

      .token-chip {
        flex: 1 1 140px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.62);
      }

      .token-swatch {
        width: 100%;
        height: 22px;
        border-radius: 999px;
        border: 1px solid rgba(20, 32, 49, 0.12);
        margin-bottom: 10px;
      }

      .token-label {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-soft);
      }

      .token-value {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 700;
      }

      .mono {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 12px;
      }

      @media (max-width: 980px) {
        .hero,
        .workspace {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="app" aria-live="polite"></div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
