<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>Paint Web Runtime Prototype</title>
    <link
      rel="stylesheet"
      href="../generated/paint/css/tokens.vars.css"
    />
    <link
      rel="stylesheet"
      href="../generated/paint/css/components.css"
    />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          "Iosevka Etoile",
          "IBM Plex Sans",
          sans-serif;
        background:
          radial-gradient(circle at top left, rgba(96, 165, 250, 0.18), transparent 28rem),
          radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 24rem),
          #0b1020;
        color: #edf2f7;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        display: grid;
        gap: 1.5rem;
        max-width: 72rem;
        margin: 0 auto;
        padding: 3rem 1.25rem 4rem;
      }

      .hero,
      .panel {
        border: 1px solid rgba(148, 163, 184, 0.2);
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(18px);
        border-radius: 1.25rem;
        box-shadow: 0 18px 60px rgba(2, 6, 23, 0.28);
      }

      .hero {
        padding: 1.5rem;
      }

      .eyebrow {
        margin: 0 0 0.5rem;
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #93c5fd;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.95;
      }

      .lede {
        max-width: 48rem;
        color: #cbd5e1;
        font-size: 1rem;
        line-height: 1.65;
      }

      .panel {
        padding: 1.25rem;
      }

      .panel h2 {
        margin: 0 0 0.5rem;
      }

      .boot-status {
        margin: 0;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        background: rgba(59, 130, 246, 0.16);
        color: #bfdbfe;
        font-size: 0.9rem;
      }

      body[data-demo-state="ready"] .boot-status {
        background: rgba(34, 197, 94, 0.16);
        color: #bbf7d0;
      }

      body[data-demo-state="error"] .boot-status {
        background: rgba(248, 113, 113, 0.16);
        color: #fecaca;
      }

      .meta-list,
      .artifact-list {
        display: grid;
        gap: 0.75rem;
      }

      .artifact-list,
      .meta-list {
        padding: 0;
        list-style: none;
      }

      .artifact-list li,
      .meta-list li {
        padding: 0.85rem 1rem;
        border-radius: 0.85rem;
        background: rgba(30, 41, 59, 0.7);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .artifact-list code,
      .meta-list code,
      pre {
        font-family:
          "Berkeley Mono",
          "Iosevka Term",
          monospace;
      }

      .demo-grid {
        display: grid;
        gap: 1rem;
      }

      .demo-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: center;
      }

      .token-preview {
        overflow: auto;
        padding: 1rem;
        border-radius: 0.85rem;
        background: rgba(2, 6, 23, 0.72);
      }

      .token-preview pre {
        margin: 0;
        color: #cbd5e1;
      }

      .error-panel[hidden] {
        display: none;
      }

      .error-panel {
        border-color: rgba(248, 113, 113, 0.28);
        background: rgba(69, 10, 10, 0.42);
      }

      a {
        color: #93c5fd;
      }

      @media (max-width: 640px) {
        main {
          padding-inline: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">Paint Prototype</p>
        <h1 id="demo-title">Loading...</h1>
        <p class="lede" id="demo-lede"></p>
        <p class="boot-status" id="demo-status">Waiting for browser host bootstrap…</p>
      </section>

      <section class="panel">
        <h2>Web Component Preview</h2>
        <p id="demo-summary"></p>
        <div class="demo-grid" id="demo-grid"></div>
      </section>

      <section class="panel">
        <h2>Artifact Bindings</h2>
        <ul class="artifact-list" id="artifact-list"></ul>
      </section>

      <section class="panel">
        <h2>Preview Tokens</h2>
        <div class="token-preview">
          <pre id="token-preview"></pre>
        </div>
      </section>

      <section
        class="panel error-panel"
        id="boot-error"
        hidden
      >
        <h2>Bootstrap Error</h2>
        <p id="boot-error-message"></p>
        <div class="token-preview">
          <pre id="boot-error-stack"></pre>
        </div>
      </section>
    </main>

    <script type="module">
      const title = document.getElementById("demo-title");
      const lede = document.getElementById("demo-lede");
      const status = document.getElementById("demo-status");
      const errorPanel = document.getElementById("boot-error");
      const errorMessage = document.getElementById("boot-error-message");
      const errorStack = document.getElementById("boot-error-stack");

      function describeError(error) {
        if (error instanceof Error) {
          return {
            message: error.message,
            stack: error.stack || error.message,
          };
        }

        return {
          message: String(error),
          stack: String(error),
        };
      }

      function renderShellError(error) {
        const details = describeError(error);
        document.body.dataset.demoState = "error";
        title.textContent = "Demo failed to boot";
        lede.textContent =
          "The browser host hit a bootstrap failure before the shared web runtime could render.";
        status.textContent = "Browser host failed.";
        errorPanel.hidden = false;
        errorMessage.textContent = details.message;
        errorStack.textContent = details.stack;
      }

      window.addEventListener("error", (event) => {
        if (document.body.dataset.demoState !== "ready") {
          renderShellError(event.error || event.message);
        }
      });

      window.addEventListener("unhandledrejection", (event) => {
        renderShellError(event.reason);
      });

      document.body.dataset.demoState = "loading";
      status.textContent = "Loading demo bootstrap…";

      import("./dist/boot.js")
        .then(({ bootDemoHost }) => bootDemoHost(document))
        .catch((error) => {
          renderShellError(error);
        });
    </script>
  </body>
</html>
